<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Clientes - TechMóbil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-custom { background-color: #0f172a; border-bottom: 1px solid #1e293b; }
        .card-custom { background-color: #1e293b; border: none; border-radius: 12px; }
        .table-dark { --bs-table-bg: #1e293b; }
        .btn-primary-custom { background-color: #3b82f6; border: none; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><span class="text-white">GESTOR DE</span> <span style="color: #3b82f6;">CLIENTES</span></h2>
        <a th:href="@{/clientes/nuevo}" class="btn btn-primary-custom px-4 py-2">
            <i class="bi bi-person-plus-fill me-2"></i> Nuevo Cliente
        </a>
    </div>

    <div class="card card-custom p-4 shadow-lg">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead class="text-secondary smaller text-uppercase">
                <tr>
                    <th>DNI</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cliente : ${clientes}">
                    <td class="fw-bold" th:text="${cliente.dni}"></td>
                    <td th:text="${cliente.nombre}"></td>
                    <td th:text="${cliente.telefono}"></td>
                    <td th:text="${cliente.direccion}"></td>
                    <td class="text-center">
                        <a href="#" class="btn btn-sm btn-outline-info rounded-pill px-3">
                            <i class="bi bi-clock-history"></i> Historial
                        </a>
                    </td>
                </tr>
                <tr th:if="${clientes.isEmpty()}">
                    <td colspan="5" class="text-center py-4 text-secondary italic">
                        No hay clientes registrados aún.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4">
        <a href="/" class="text-secondary text-decoration-none small">
            <i class="bi bi-arrow-left"></i> Volver al Marketplace
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
