<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - TechMóbil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: radial-gradient(circle at center, #0047ab, #001a3d);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .icon-box {
            background: #3b82f6;
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white !important;
            border-radius: 12px;
            padding: 12px 15px 12px 45px;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.5); }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #3b82f6;
            box-shadow: none;
        }
        .input-group-text {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            position: absolute;
            z-index: 10;
            padding: 12px 15px;
        }
        .btn-login {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 150, 255, 0.4);
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="icon-box">
        <i class="bi bi-phone-vibrate"></i>
    </div>
    <h3 class="fw-bold mb-0">TECHMÓBIL</h3>
    <p class="text-secondary small mb-4">Sistema de Gestión Empresarial</p>

    <form th:action="@{/login}" method="post">

        <div th:if="${param.error}" class="alert alert-danger py-2 small" style="background: rgba(220, 53, 69, 0.2); border: none; color: #ff8e97;">
            Usuario o clave incorrectos.
        </div>

        <div class="text-start mb-3 position-relative">
            <label class="small fw-bold mb-1 text-uppercase" style="font-size: 0.7rem; color: #3b82f6;">Usuario</label>
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required>
        </div>

        <div class="text-start mb-4 position-relative">
            <label class="small fw-bold mb-1 text-uppercase" style="font-size: 0.7rem; color: #3b82f6;">Contraseña</label>
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
        </div>

        <button type="submit" class="btn btn-login w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
        </button>
    </form>

    <p class="mt-5 text-secondary" style="font-size: 0.7rem;">© 2026 TECHMÓBIL - Deep Blue Edition v2.0</p>
</div>

</body>
</html>
