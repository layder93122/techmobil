<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechMóbil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: radial-gradient(circle at center, #0047ab, #001a3d);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .icon-box {
            background: #3b82f6;
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .form-control {
            /* Fondo oscurecido para contraste WCAG AA con texto blanco */
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white !important;
            border-radius: 12px;
            padding: 12px 15px 12px 45px;
        }
        .form-control::placeholder { 
            color: rgba(255, 255, 255, 0.7); 
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.45) !important;
            border-color: #3b82f6;
            box-shadow: none;
        }
        .input-group-text-custom {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            position: absolute;
            z-index: 10;
            padding: 12px 15px;
            top: 28px;
        }
        .btn-login {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            /* Texto oscuro sobre fondo claro para máximo contraste */
            color: #003366 !important;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 150, 255, 0.4);
            color: #002244 !important;
        }
        .text-custom-muted {
            color: rgba(255, 255, 255, 0.75);
        }
    </style>
</head>
<body>

<main class="login-card">
    <div class="icon-box">
        <i class="bi bi-phone-vibrate" aria-hidden="true"></i>
    </div>
    <header>
        <h1 class="h3 fw-bold mb-0">TECHMÓBIL</h1>
        <p class="text-custom-muted small mb-4">Sistema de Gestión Empresarial</p>
    </header>

    <form th:action="@{/login}" method="post">

        <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert" style="background: rgba(220, 53, 69, 0.4); border: 1px solid #ff8e97; color: white;">
            Usuario o clave incorrectos.
        </div>

        <div th:if="${param.logout}" class="alert alert-info py-2 small" role="alert" style="background: rgba(59, 130, 246, 0.3); border: 1px solid #8ec5ff; color: white;">
            Has cerrado sesión correctamente.
        </div>

        <div class="text-start mb-3 position-relative">
            <label for="username" class="small fw-bold mb-1 text-uppercase" style="font-size: 0.7rem; color: #7cb1ff;">Usuario</label>
            <span class="input-group-text-custom"><i class="bi bi-person" aria-hidden="true"></i></span>
            <input type="text" id="username" name="username" class="form-control" placeholder="Ingrese su usuario" required autocomplete="username">
        </div>

        <div class="text-start mb-4 position-relative">
            <label for="password" class="small fw-bold mb-1 text-uppercase" style="font-size: 0.7rem; color: #7cb1ff;">Contraseña</label>
            <span class="input-group-text-custom"><i class="bi bi-lock" aria-hidden="true"></i></span>
            <input type="password" id="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-login w-100">
            <i class="bi bi-box-arrow-in-right me-2" aria-hidden="true"></i> Iniciar Sesión
        </button>
    </form>

    <footer class="mt-5 text-custom-muted" style="font-size: 0.7rem;">
        <p>© 2026 TECHMÓBIL - Deep Blue Edition v2.0</p>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
