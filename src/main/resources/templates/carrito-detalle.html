<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tu Carrito - TechMóbil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card-boleta { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .table-dark { --bs-table-bg: #1e293b; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="card card-boleta p-4 shadow">
        <h2 class="fw-bold text-primary mb-4">RESUMEN DE COMPRA</h2>
        <table class="table table-dark">
            <thead>
            <tr>
                <th>Producto</th>
                <th>Cant.</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.p.marca + ' ' + item.p.modelo}"></td>
                <td th:text="${item.cant}"></td>
                <td th:text="'S/ ' + ${item.p.precio}"></td>
                <td th:text="'S/ ' + ${item.sub}"></td>
            </tr>
            </tbody>
        </table>
        <div class="text-end mt-4">
            <h4 class="text-secondary">TOTAL A PAGAR:</h4>
            <h1 class="text-white fw-bold" th:text="'S/ ' + ${total}"></h1>
            <hr class="border-secondary">
            <div class="d-flex justify-content-end gap-2">
                <a href="/" class="btn btn-outline-light">SEGUIR COMPRANDO</a>
                <a th:href="@{/carrito/boleta}" class="btn btn-primary px-5">GENERAR BOLETA</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
