<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Carrito - TechMóbil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #0f172a; color: #f8fafc; }

        .card-boleta {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
        }

        .table-dark {
            --bs-table-bg: #1e293b;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card card-boleta p-4 shadow">

        <h2 class="fw-bold text-primary mb-4">RESUMEN DE COMPRA</h2>

        <div class="mb-3">
            <label class="small text-secondary">Identificar Cliente (DNI):</label>

            <div class="input-group input-group-sm">
                <input type="text"
                       id="dniInput"
                       class="form-control bg-dark text-white border-secondary"
                       placeholder="Ingrese DNI">

                <button class="btn btn-primary" onclick="buscarClientePorDni()">🔍</button>
            </div>

            <div id="clienteInfo" class="small mt-2 text-info">
                Cliente no identificado
            </div>
        </div>

        <table class="table table-dark">
            <thead>
            <tr>
                <th>Producto</th>
                <th>Cant.</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.p.marca + ' ' + item.p.modelo}">Producto</td>
                <td th:text="${item.cant}">1</td>
                <td th:text="'S/ ' + ${item.p.precio}">S/ 0.00</td>
                <td th:text="'S/ ' + ${item.sub}">S/ 0.00</td>
            </tr>
            </tbody>
        </table>

        <div class="text-end mt-4">
            <h4 class="text-secondary">TOTAL A PAGAR:</h4>

            <h1 class="text-white fw-bold"
                th:text="'S/ ' + ${#numbers.formatDecimal(total,1,2)}">
                S/ 0.00
            </h1>

            <hr class="border-secondary">

            <div class="d-flex justify-content-end gap-2">
                <a href="/" class="btn btn-outline-light">
                    SEGUIR COMPRANDO
                </a>

                <a th:href="@{/carrito/boleta}" class="btn btn-primary px-5">
                    GENERAR BOLETA
                </a>
            </div>
        </div>

    </div>
</div>

<script>
    function buscarClientePorDni() {
        const dni = document.getElementById('dniInput').value;

        if (!dni) {
            alert("Ingrese un DNI");
            return;
        }

        fetch('/clientes/buscar?dni=' + dni)
            .then(res => res.json())
            .then(data => {
                if (data && data.nombre) {
                    document.getElementById('clienteInfo').innerText =
                        "Venta para: " + data.nombre;
                } else {
                    document.getElementById('clienteInfo').innerText =
                        "No encontrado. Regístrelo.";
                }
            })
            .catch(() => {
                alert("Error al buscar cliente");
            });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
