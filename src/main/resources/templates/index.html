<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMóbil - Tienda de Celulares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Navbar */
        .navbar-custom {
            background-color: #0f172a;
            border-bottom: 1px solid #1e293b;
        }
        .navbar-brand { letter-spacing: 1px; font-size: 1.4rem; }
        .nav-link {
            color: #94a3b8 !important;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-link:hover, .nav-link.active { color: #3b82f6 !important; }

        /* Icono Carrito Navbar */
        .cart-icon {
            position: relative;
            background: #3b82f6;
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 50%;
            border: 2px solid #0f172a;
        }

        /* Tarjetas de Producto */
        .product-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            transition: transform 0.3s ease;
            height: 100%;
        }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; }

        .img-container {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 15px;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            overflow: hidden;
        }
        .img-container img { max-height: 100%; max-width: 100%; object-fit: contain; }

        .price-tag { color: #f8fafc; font-size: 1.25rem; font-weight: bold; }
        .stars { color: #fbbf24; font-size: 0.9rem; }

        /* --- NUEVOS ESTILOS SIDEBAR Y BOTONES --- */
        .bg-sidebar {
            background-color: #1e293b;
            color: #f8fafc;
            border-radius: 12px;
        }

        .btn-primary-custom {
            background-color: #3b82f6;
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-primary-custom:hover { background-color: #2563eb; color: white; }

        .btn-outline-custom {
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-outline-custom:hover { border-color: #3b82f6; color: #3b82f6; }

        .smaller { font-size: 0.8rem; }

        /* Scrollbar Sidebar */
        .cart-items-scroll::-webkit-scrollbar { width: 4px; }
        .cart-items-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
            <span style="color: #f8fafc;">TECH</span><span style="color: #3b82f6;">MÓBIL</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav gap-3">
                <li class="nav-item"><a class="nav-link" th:href="@{/telefonos}">Teléfonos</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Accesorios</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Soporte</a></li>
            </ul>
        </div>

        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/nuevo}" class="btn btn-sm btn-outline-light me-3">+ Vender Celular</a>
            <a href="#" class="text-light me-2"><i class="bi bi-search fs-5"></i></a>
            <a th:href="@{/carrito/ver}" class="cart-icon">
                <i class="bi bi-bag-fill fs-5"></i>
                <span class="cart-badge" th:if="${session.totalItems != null}" th:text="${session.totalItems}">0</span>
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 mt-4">
    <div class="row">
        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0 text-uppercase" th:text="${titulo != null ? titulo : 'NOVEDADES Y DESTACADOS'}">
                    NOVEDADES Y DESTACADOS
                </h3>
                <a th:href="@{/nuevo}" class="btn btn-primary-custom btn-sm px-4 shadow-sm">+ VENDER</a>
            </div>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                <div class="col" th:each="c : ${lista}">
                    <div class="card product-card shadow-sm p-2">
                        <div class="img-container">
                            <img th:if="${c.imagen != null}" th:src="@{'/imagenes/' + ${c.imagen}}" th:alt="${c.modelo}">
                            <i th:unless="${c.imagen != null}" class="bi bi-phone text-secondary" style="font-size: 4rem;"></i>
                        </div>

                        <div class="card-body pt-0">
                            <h6 class="card-title mb-1 text-truncate fw-bold" th:text="${c.marca} + ' ' + ${c.modelo}">Producto</h6>
                            <div class="stars mb-2">
                                <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-half"></i>
                                <span class="text-secondary ms-1 small">4.8</span>
                            </div>
                            <p class="price-tag mb-3" th:text="'S/ ' + ${#numbers.formatDecimal(c.precio, 1, 2)}">S/ 0.00</p>

                            <div class="d-grid gap-2">
                                <form th:action="@{'/carrito/agregar/' + ${c.id}}" method="post">
                                    <button type="submit" class="btn btn-primary-custom btn-sm py-2 w-100">
                                        AÑADIR AL CARRITO
                                    </button>
                                </form>

                                <div class="d-flex gap-2">
                                    <a th:href="@{'/nuevo/' + ${c.id}}" class="btn btn-outline-custom btn-sm w-100 py-1">EDITAR</a>
                                    <form th:action="@{'/eliminar/' + ${c.id}}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-outline-danger btn-sm px-3 py-1"
                                                onclick="return confirm('¿Eliminar?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="sticky-top" style="top: 100px;">
                <div class="card bg-sidebar border-0 p-3 shadow-lg">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0">TU CARRITO (<span th:text="${session.totalItems != null ? session.totalItems : '0'}">0</span>)</h6>
                        <i class="bi bi-chevron-down small"></i>
                    </div>

                    <hr class="border-secondary opacity-25">

                    <div class="cart-items-scroll mb-3" style="max-height: 400px; overflow-y: auto;">
                        <p th:if="${session.carrito == null || session.carrito.isEmpty()}" class="text-secondary text-center small py-4">
                            Tu carrito está vacío
                        </p>

                        <div th:each="item : ${session.carritoItems}" class="d-flex align-items-center mb-3">
                            <div class="bg-dark rounded p-1 me-2" style="width: 50px; height: 50px; flex-shrink: 0;">
                                <img th:src="@{'/imagenes/' + ${item.p.imagen}}" class="img-fluid rounded h-100 w-100 object-fit-contain" alt="thumb">
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between">
                                    <span class="small fw-bold text-white text-truncate" style="max-width: 120px;" th:text="${item.p.marca + ' ' + item.p.modelo}"></span>
                                    <a href="#" class="text-secondary small"><i class="bi bi-x-lg"></i></a>
                                </div>
                                <span class="text-secondary smaller d-block" th:text="'S/ ' + ${item.p.precio}"></span>
                            </div>
                        </div>
                    </div>

                    <hr class="border-secondary opacity-25">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-secondary">Total:</span>
                        <h5 class="mb-0 fw-bold" th:text="'S/ ' + ${session.totalPagar != null ? session.totalPagar : '0.00'}"></h5>
                    </div>

                    <div class="d-grid gap-2">
                        <a th:href="@{/carrito/boleta}" class="btn btn-primary-custom py-2 fw-bold"
                           th:classappend="${session.totalItems == null || session.totalItems == 0} ? 'disabled' : ''">PAGAR AHORA</a>
                        <a th:href="@{/carrito/ver}" class="btn btn-outline-custom py-2 text-uppercase smaller fw-bold">Ver Carrito</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
