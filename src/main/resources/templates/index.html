<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMóbil - Catálogo Profesional</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }
        .navbar-custom { background-color: #0f172a; border-bottom: 1px solid #1e293b; }
        .nav-link { color: #94a3b8 !important; transition: 0.3s; }
        .nav-link:hover { color: #3b82f6 !important; }
        
        .product-card {
            background-color: #1e293b;
            border-radius: 15px;
            border: 1px solid #334155;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* CORRECCIÓN DE CONTRASTE: Se usó un azul más oscuro para el fondo */
        .cart-icon {
            position: relative;
            background: #2563eb; 
            padding: 8px 12px;
            border-radius: 8px;
            color: #ffffff !important;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: background 0.2s;
        }
        .cart-icon:hover {
            background: #1d4ed8;
        }

        /* CORRECCIÓN DE CONTRASTE: Rojo más intenso para el badge */
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #dc2626; 
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50px;
            border: 2px solid #0f172a; /* Añade separación visual del fondo */
        }

        .btn-primary {
            background-color: #3b82f6;
            border: none;
            color: #ffffff;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span style="color:white;">TECH</span><span style="color:#3b82f6;">MÓBIL</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir navegación">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav gap-3">
                <li class="nav-item"><a class="nav-link" th:href="@{/telefonos}">Teléfonos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/clientes/lista}">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Soporte</a></li>
            </ul>
        </div>

        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/nuevo}" class="btn btn-sm btn-outline-light">+ Vender</a>
            <a th:href="@{/carrito/ver}" class="cart-icon" aria-label="Ver carrito de compras">
                <i class="bi bi-bag-fill" aria-hidden="true"></i>
                <span class="cart-badge" th:if="${session.totalItems != null}" th:text="${session.totalItems}">0</span>
            </a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <header class="mb-4">
        <h1 class="h2 fw-bold">Catálogo de Productos</h1>
        <p class="text-white-50">Tienda TechMóbil</p>
    </header>

    <section class="row g-3 mb-4" aria-label="Resumen de stock">
        <div class="col-md-4">
            <div class="stat-card">
                <p class="small text-secondary text-uppercase fw-bold mb-1">Total Productos</p>
                <h2 class="h4 mb-0" th:text="${#lists.size(lista)}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <p class="small text-secondary text-uppercase fw-bold mb-1">Stock Total</p>
                <h2 class="h4 mb-0">66</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <p class="small text-secondary text-uppercase fw-bold mb-1">Valor Total</p>
                <h2 class="h4 mb-0 text-info">S/ 286,544.12</h2>
            </div>
        </div>
    </section>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="c : ${lista}">
            <article class="card product-card p-3">
                <div class="text-center mb-3">
                    <img th:src="@{'/imagenes/' + ${c.imagen}}"
                         class="img-fluid rounded-3"
                         th:alt="'Celular ' + ${c.marca} + ' ' + ${c.modelo}"
                         style="max-height: 200px; object-fit: contain;">
                </div>

                <div class="card-body p-0 d-flex flex-column">
                    <p class="text-secondary small mb-1 text-uppercase" th:text="${c.marca}">Marca</p>
                    <h3 class="h5 fw-bold" th:text="${c.modelo}">Modelo</h3>

                    <div class="d-flex justify-content-between align-items-center mb-3 mt-auto">
                        <span class="h4 text-info fw-bold mb-0" th:text="'S/ ' + ${c.precio}">S/ 0.00</span>
                        <span class="badge bg-dark text-success border border-success" th:text="'Stock: ' + ${c.stock}">0</span>
                    </div>

                    <form th:action="@{'/carrito/agregar/' + ${c.id}}" method="post">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">
                            <i class="bi bi-cart-plus me-2" aria-hidden="true"></i>AÑADIR AL CARRITO
                        </button>
                    </form>
                </div>
            </article>
        </div>
    </div>
</main>

<footer class="container py-5 text-center text-white-50">
    <p class="small">© 2026 TechMóbil - Panel de Control</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
