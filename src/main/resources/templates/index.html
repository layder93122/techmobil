<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMóbil - Tienda de Celulares</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #0f172a; color: #f8fafc; }

        .navbar-custom {
            background-color: #0f172a;
            border-bottom: 1px solid #1e293b;
        }

        .nav-link {
            color: #94a3b8 !important;
            transition: 0.3s;
        }

        .nav-link:hover { color: #3b82f6 !important; }

        .product-card {
            background-color: #1e293b;
            border-radius: 15px;
            border: 1px solid #334155;
            transition: 0.3s;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .badge-trending {
            background: #ff8c66;
            color: #000;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .cart-icon {
            position: relative;
            background: #3b82f6;
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

<!-- NAVBAR (YA UNIFICADO) -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span style="color:white;">TECH</span><span style="color:#3b82f6;">MÓBIL</span>
        </a>

        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav gap-3">
                <li class="nav-item"><a class="nav-link" th:href="@{/telefonos}">Teléfonos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/clientes/lista}">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Soporte</a></li>
            </ul>
        </div>

        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/nuevo}" class="btn btn-sm btn-outline-light">+ Vender</a>

            <a th:href="@{/carrito/ver}" class="cart-icon">
                <i class="bi bi-bag-fill"></i>
                <span class="cart-badge"
                      th:if="${session.totalItems != null}"
                      th:text="${session.totalItems}">0</span>
            </a>
        </div>

    </div>
</nav>

<!-- HEADER -->
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Catálogo de Productos</h2>
            <p class="text-white-50">Tienda Interactiva - TechMóbil</p>
        </div>
    </div>

    <!-- ESTADÍSTICAS -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <span>Total Productos</span>
                <h3 th:text="${#lists.size(lista)}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <span>Stock Total</span>
                <h3>66</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <span>Valor Total</span>
                <h3 class="text-info">S/ 286,544.12</h3>
            </div>
        </div>
    </div>

    <!-- PRODUCTOS -->
    <div class="row row-cols-1 row-cols-md-3 g-4">

        <div class="col" th:each="c : ${lista}">
            <div class="card product-card p-3 h-100">

                <div class="position-relative mb-3">
                    <img th:src="@{'/imagenes/' + ${c.imagen}}"
                         class="img-fluid rounded-3">

                    <span class="badge badge-trending position-absolute top-0 end-0 m-2 rounded-pill">
                        TRENDING
                    </span>
                </div>

                <small class="text-secondary" th:text="${c.marca}">Marca</small>

                <h5 class="fw-bold" th:text="${c.modelo}">Modelo</h5>

                <div class="d-flex justify-content-between mb-3">
                    <h4 class="text-info fw-bold" th:text="'S/ ' + ${c.precio}">S/ 0.00</h4>
                    <small class="text-success" th:text="'Stock: ' + ${c.stock}"></small>
                </div>

                <form th:action="@{'/carrito/agregar/' + ${c.id}}" method="post">
                    <button class="btn btn-primary w-100">
                        AÑADIR AL CARRITO
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
