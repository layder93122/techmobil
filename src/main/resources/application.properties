# =========================
# SPRING APPLICATION
# =========================
spring.application.name=celulares

# =========================
# SPRING SECURITY (BÁSICO)
# =========================
# Variables de entorno (recomendado para seguridad y SonarCloud)
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASS:X9#kL2@pQ7!mZ4}

# =========================
# H2 DATABASE
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:celularesdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
