spring.application.name=celulares
# Habilitar la consola de H2 para ver los datos en el navegador
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:celularesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Para que Hibernate cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Permitir archivos de hasta 10MB (puedes poner más si quieres)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB